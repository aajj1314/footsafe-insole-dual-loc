# 足安智能防走失系统
# Docker Compose配置 - 一键部署

services:
  # ==================== API服务 ====================
  api-service:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: terminal-api
    ports:
      - "8090:8090"
    environment:
      - DATABASE_URL=mysql+aiomysql://shoe_insole:shoe_insole_password@mysql:3306/shoe_insole
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=zu-an-secret-key-2024-change-in-production
      - JWT_ALGORITHM=HS256
    volumes:
      - ./logs:/var/log/terminal_service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - terminal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== 前端服务 ====================
  frontend-service:
    image: nginx:alpine
    container_name: terminal-frontend
    ports:
      - "8000:80"
    volumes:
      - ./web/dist:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-service
    networks:
      - terminal-network
    restart: unless-stopped

  # ==================== 终端服务（UDP/TCP协议） ====================
  terminal-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terminal-service
    ports:
      - "8888:8888/udp"
      - "8889:8889/tcp"
    environment:
      - SERVICE_NAME=device_terminal_service
      - DEBUG=false
      - HOST=0.0.0.0
      - LOG_LEVEL=INFO
      - HTTP_API_PORT=8091
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=shoe_insole
      - INFLUXDB_URL=http://influxdb:8086
    volumes:
      - ./logs:/var/log/terminal_service
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      influxdb:
        condition: service_healthy
    networks:
      - terminal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('127.0.0.1', 8888)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ==================== MySQL数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: terminal-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=shoe_insole
      - MYSQL_USER=shoe_insole
      - MYSQL_PASSWORD=shoe_insole_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - terminal-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==================== Redis缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: terminal-redis
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    networks:
      - terminal-network
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "" --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== InfluxDB时序数据库 ====================
  influxdb:
    image: influxdb:2.7
    container_name: terminal-influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin_password
      - DOCKER_INFLUXDB_INIT_ORG=shoe_insole
      - DOCKER_INFLUXDB_INIT_BUCKET=location
      - DOCKER_INFLUXDB_INIT_TOKEN=influxdb_token
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - terminal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ==================== 数据卷 ====================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  influxdb-data:
    driver: local

# ==================== 网络 ====================
networks:
  terminal-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
